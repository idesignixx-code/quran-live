<!DOCTYPE html>
<html class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>🌙 Quran Live - Mobile</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Scheherazade+New:wght@700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: 'Roboto', sans-serif;
            background: #0f1419;
            color: white;
            overflow-x: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
            overscroll-behavior: none;
        }
        
        .font-quran { font-family: 'Scheherazade New', serif; }
        
        .header-bar {
            background: rgba(20, 30, 48, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(59, 130, 246, 0.2);
        }
        
        .mic-button {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 4px solid rgba(16, 185, 129, 0.3);
        }
        
        .mic-button:active {
            transform: scale(0.95);
        }
        
        .mic-button.recording {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            box-shadow: 0 10px 30px rgba(239, 68, 68, 0.4);
            animation: pulse-red 1.5s infinite;
        }
        
        @keyframes pulse-red {
            0%, 100% { box-shadow: 0 10px 30px rgba(239, 68, 68, 0.4); }
            50% { box-shadow: 0 10px 50px rgba(239, 68, 68, 0.8); }
        }
        
        .verse-arabic {
            font-size: clamp(2rem, 8vw, 4rem);
            line-height: 1.8;
            animation: fadeIn 0.5s;
        }
        
        .verse-translation {
            font-size: clamp(1.1rem, 4vw, 1.8rem);
            line-height: 1.6;
            animation: fadeIn 0.6s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .confidence-bar {
            height: 4px;
            background: linear-gradient(90deg, #10b981 0%, #3b82f6 100%);
            transition: width 0.5s;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #10b981;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .lang-selector {
            display: flex;
            gap: 0.5rem;
            padding: 0.5rem;
            background: rgba(30, 41, 59, 0.6);
            border-radius: 1rem;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        .lang-btn {
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(71, 85, 105, 0.5);
            border: 1px solid transparent;
        }
        
        .lang-btn.active {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            border-color: #60a5fa;
        }
        
        .next-verse {
            background: rgba(30, 41, 59, 0.6);
            border-left: 3px solid #3b82f6;
            padding: 0.75rem;
            border-radius: 0.5rem;
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>
    
    <div class="h-full flex flex-col">
        
        <!-- Header -->
        <div class="header-bar px-4 py-3">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-2">
                    <span class="text-2xl">🌙</span>
                    <div>
                        <div class="text-sm font-bold" id="surah-info">Waiting...</div>
                        <div class="text-xs text-gray-400" id="lang-display">Mobile</div>
                    </div>
                </div>
                
                <div class="flex items-center space-x-3">
                    <div class="text-right">
                        <div class="text-xs text-gray-400">Conf.</div>
                        <div class="text-lg font-bold text-green-400" id="confidence">-</div>
                    </div>
                    <div class="flex items-center space-x-1">
                        <div class="status-dot" id="status-dot"></div>
                        <span class="text-xs text-green-400" id="status-text">OK</span>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Confidence Bar -->
        <div class="w-full bg-gray-800 h-1">
            <div class="confidence-bar" id="confidence-bar" style="width: 0%"></div>
        </div>
        
        <!-- Language Selector -->
        <div class="px-4 py-2">
            <div class="lang-selector">
                <div class="lang-btn active" data-lang="en" onclick="setLanguage('en')">🇬🇧 EN</div>
                <div class="lang-btn" data-lang="ar" onclick="setLanguage('ar')">🇸🇦 AR</div>
                <div class="lang-btn" data-lang="fr" onclick="setLanguage('fr')">🇫🇷 FR</div>
                <div class="lang-btn" data-lang="nl" onclick="setLanguage('nl')">🇳🇱 NL</div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="flex-1 overflow-y-auto px-4 py-4">
            
            <!-- Arabic Verse -->
            <div class="text-center mb-6">
                <p class="verse-arabic font-quran text-white" id="arabic-text">
                    بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ
                </p>
            </div>
            
            <!-- Translation -->
            <div class="text-center mb-6">
                <p class="verse-translation text-blue-100" id="translation-text">
                    In the name of Allah, the Most Gracious, the Most Merciful
                </p>
            </div>
            
            <!-- Next Verses -->
            <div id="next-verses-container" class="mb-20">
                <!-- Next verses will appear here -->
            </div>
        </div>
        
        <!-- Microphone Button (Fixed at bottom) -->
        <div class="fixed bottom-0 left-0 right-0 pb-8 pt-4" style="background: linear-gradient(to top, #0f1419 80%, transparent);">
            <div class="flex flex-col items-center">
                <div class="mic-button" id="mic-button" onclick="toggleRecording()">
                    <svg class="w-10 h-10 text-white" fill="currentColor" viewBox="0 0 20 20" id="mic-icon">
                        <path fill-rule="evenodd" d="M7 4a3 3 0 016 0v4a3 3 0 11-6 0V4zm4 10.93A7.001 7.001 0 0017 8a1 1 0 10-2 0A5 5 0 015 8a1 1 0 00-2 0 7.001 7.001 0 006 6.93V17H6a1 1 0 100 2h8a1 1 0 100-2h-3v-2.07z" clip-rule="evenodd"></path>
                    </svg>
                </div>
                <div class="mt-2 text-xs text-gray-400" id="mic-status">Tap to record</div>
            </div>
        </div>
    </div>
    
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let language = urlParams.get('lang') || 'en';
        
        const langNames = {
            'ar': 'Arabic', 'en': 'English',
            'fr': 'French', 'nl': 'Dutch'
        };
        
        document.getElementById('lang-display').textContent = `Mobile · ${langNames[language]}`;
        
        const socket = io();
        let isRecording = false;
        let mediaRecorder = null;
        let audioChunks = [];
        
        // Connection
        socket.on('connect', () => {
            document.getElementById('status-dot').style.background = '#10b981';
            document.getElementById('status-text').textContent = 'OK';
        });
        
        socket.on('disconnect', () => {
            document.getElementById('status-dot').style.background = '#ef4444';
            document.getElementById('status-text').textContent = 'ERR';
        });
        
        // Verse matched
        socket.on('verse_matched', (data) => {
            const verse = data.verse;
            
            document.getElementById('surah-info').textContent = `${verse.surah}:${verse.ayah}`;
            document.getElementById('arabic-text').textContent = verse.ar;
            document.getElementById('translation-text').textContent = verse[language] || verse.en;
            
            const conf = Math.round((data.confidence || 0) * 100);
            document.getElementById('confidence').textContent = `${conf}%`;
            document.getElementById('confidence-bar').style.width = `${conf}%`;
        });
        
        // Next verses
        socket.on('next_verses', (data) => {
            const container = document.getElementById('next-verses-container');
            container.innerHTML = '';
            
            if (data.verses && data.verses.length > 0) {
                data.verses.forEach((verse) => {
                    const trans = verse[language] || verse.en || '';
                    const div = document.createElement('div');
                    div.className = 'next-verse';
                    div.innerHTML = `
                        <div class="flex items-start space-x-2">
                            <span class="text-blue-400 font-bold text-sm">${verse.ayah}</span>
                            <div class="flex-1 min-w-0">
                                <p class="text-white text-sm font-quran mb-1 truncate">${verse.ar}</p>
                                <p class="text-gray-300 text-xs">${trans.substring(0, 60)}...</p>
                            </div>
                        </div>
                    `;
                    container.appendChild(div);
                });
            }
        });
        
        // Language selection
        function setLanguage(lang) {
            language = lang;
            document.getElementById('lang-display').textContent = `Mobile · ${langNames[lang]}`;
            
            document.querySelectorAll('.lang-btn').forEach(btn => {
                if (btn.dataset.lang === lang) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }
        
        // Microphone recording
        async function toggleRecording() {
            if (!isRecording) {
                await startRecording();
            } else {
                stopRecording();
            }
        }
        
        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        sampleRate: 16000
                    } 
                });
                
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                
                mediaRecorder.ondataavailable = (event) => {
                    audioChunks.push(event.data);
                };
                
                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                    
                    // Convert to base64 and send to server
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        const base64Audio = reader.result.split(',')[1];
                        socket.emit('audio_data', { 
                            audio: base64Audio, 
                            lang: language 
                        });
                    };
                    reader.readAsDataURL(audioBlob);
                    
                    stream.getTracks().forEach(track => track.stop());
                };
                
                mediaRecorder.start();
                isRecording = true;
                
                document.getElementById('mic-button').classList.add('recording');
                document.getElementById('mic-status').textContent = 'Recording...';
                
            } catch (error) {
                console.error('Microphone error:', error);
                alert('Unable to access microphone. Please grant permission.');
            }
        }
        
        function stopRecording() {
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                
                document.getElementById('mic-button').classList.remove('recording');
                document.getElementById('mic-status').textContent = 'Processing...';
                
                setTimeout(() => {
                    document.getElementById('mic-status').textContent = 'Tap to record';
                }, 2000);
            }
        }
        
        // Prevent zoom on double tap
        let lastTouchEnd = 0;
        document.addEventListener('touchend', (e) => {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) {
                e.preventDefault();
            }
            lastTouchEnd = now;
        }, false);
        
        // Initialize
        setLanguage(language);
    </script>
</body>
</html>
