<!DOCTYPE html>
<html class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>🌙 Quran Live - Mobile</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Scheherazade+New:wght@700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: 'Roboto', sans-serif;
            background: #0f1419;
            color: white;
            overflow-x: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        
        .font-quran { font-family: 'Scheherazade New', serif; }
        
        .header-bar {
            background: rgba(20, 30, 48, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(59, 130, 246, 0.2);
        }
        
        .mic-button {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 4px solid rgba(16, 185, 129, 0.3);
        }
        
        .mic-button:active {
            transform: scale(0.95);
        }
        
        .mic-button.listening {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            box-shadow: 0 10px 30px rgba(239, 68, 68, 0.4);
            animation: pulse-red 1.5s infinite;
        }
        
        @keyframes pulse-red {
            0%, 100% { 
                box-shadow: 0 10px 30px rgba(239, 68, 68, 0.4);
                transform: scale(1);
            }
            50% { 
                box-shadow: 0 10px 50px rgba(239, 68, 68, 0.8);
                transform: scale(1.05);
            }
        }
        
        .verse-arabic {
            font-size: clamp(2rem, 8vw, 4rem);
            line-height: 1.8;
            animation: fadeIn 0.5s;
        }
        
        .verse-translation {
            font-size: clamp(1.1rem, 4vw, 1.8rem);
            line-height: 1.6;
            animation: fadeIn 0.6s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .confidence-bar {
            height: 4px;
            background: linear-gradient(90deg, #10b981 0%, #3b82f6 100%);
            transition: width 0.5s;
        }
        
        .lang-btn {
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(71, 85, 105, 0.5);
            border: 1px solid transparent;
        }
        
        .lang-btn.active {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            border-color: #60a5fa;
        }
        
        .auto-start-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
    </style>
</head>
<body>
    
    <!-- Auto-start overlay -->
    <div class="auto-start-overlay" id="start-overlay">
        <div class="text-center p-8">
            <div class="text-6xl mb-6">🎤</div>
            <h2 class="text-2xl font-bold mb-4">Quran Live Translation</h2>
            <p class="text-gray-300 mb-8">اضغط للبدء - Click to Start</p>
            <button onclick="startListening()" class="px-8 py-4 bg-green-600 hover:bg-green-700 rounded-xl text-xl font-bold transition-all">
                ابدأ التسجيل - Start Listening
            </button>
        </div>
    </div>
    
    <div class="h-full flex flex-col">
        
        <!-- Header -->
        <div class="header-bar px-4 py-3">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-2">
                    <span class="text-2xl">🌙</span>
                    <div>
                        <div class="text-sm font-bold" id="surah-info">Waiting...</div>
                        <div class="text-xs text-gray-400" id="lang-display">Mobile</div>
                    </div>
                </div>
                
                <div class="flex items-center space-x-3">
                    <div class="text-right">
                        <div class="text-xs text-gray-400">Conf.</div>
                        <div class="text-lg font-bold text-green-400" id="confidence">-</div>
                    </div>
                    <div class="flex items-center space-x-1">
                        <div class="w-2 h-2 rounded-full bg-gray-500" id="status-dot"></div>
                        <span class="text-xs text-gray-400" id="status-text">...</span>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Confidence Bar -->
        <div class="w-full bg-gray-800 h-1">
            <div class="confidence-bar" id="confidence-bar" style="width: 0%"></div>
        </div>
        
        <!-- Language Selector -->
        <div class="px-4 py-2">
            <div class="flex gap-2 overflow-x-auto">
                <div class="lang-btn active" data-lang="en" onclick="setLanguage('en')">🇬🇧 EN</div>
                <div class="lang-btn" data-lang="ar" onclick="setLanguage('ar')">🇸🇦 AR</div>
                <div class="lang-btn" data-lang="fr" onclick="setLanguage('fr')">🇫🇷 FR</div>
                <div class="lang-btn" data-lang="nl" onclick="setLanguage('nl')">🇳🇱 NL</div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="flex-1 overflow-y-auto px-4 py-4">
            
            <!-- Arabic Verse -->
            <div class="text-center mb-6">
                <p class="verse-arabic font-quran text-white" id="arabic-text">
                    بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ
                </p>
            </div>
            
            <!-- Translation -->
            <div class="text-center mb-6">
                <p class="verse-translation text-blue-100" id="translation-text">
                    In the name of Allah, the Most Gracious, the Most Merciful
                </p>
            </div>
            
            <!-- Next Verses -->
            <div id="next-verses-container" class="mb-20"></div>
        </div>
        
        <!-- Microphone Button (Fixed at bottom) -->
        <div class="fixed bottom-0 left-0 right-0 pb-8 pt-4" style="background: linear-gradient(to top, #0f1419 80%, transparent);">
            <div class="flex flex-col items-center">
                <div class="mic-button" id="mic-button" onclick="toggleListening()">
                    <svg class="w-10 h-10 text-white" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M7 4a3 3 0 016 0v4a3 3 0 11-6 0V4zm4 10.93A7.001 7.001 0 0017 8a1 1 0 10-2 0A5 5 0 015 8a1 1 0 00-2 0 7.001 7.001 0 006 6.93V17H6a1 1 0 100 2h8a1 1 0 100-2h-3v-2.07z" clip-rule="evenodd"></path>
                    </svg>
                </div>
                <div class="mt-2 text-xs text-gray-400" id="mic-status">Tap to start</div>
            </div>
        </div>
    </div>
    
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let language = urlParams.get('lang') || 'en';
        
        const langNames = {
            'ar': 'Arabic', 'en': 'English',
            'fr': 'French', 'nl': 'Dutch'
        };
        
        document.getElementById('lang-display').textContent = `Mobile · ${langNames[language]}`;
        
        const socket = io();
        let isListening = false;
        let recognition = null;
        let shouldRestart = false;
        
        // Initialize Speech Recognition
        function initRecognition() {
            if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
                alert('Speech recognition not supported. Use Chrome or Edge.');
                return false;
            }
            
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.lang = 'ar-SA';
            recognition.continuous = true;  // مستمر!
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;
            
            recognition.onresult = (event) => {
                const lastResult = event.results[event.results.length - 1];
                if (lastResult.isFinal) {
                    const text = lastResult[0].transcript;
                    console.log('Recognized:', text);
                    
                    // إرسال للخادم مباشرة
                    socket.emit('recognize_verse', {
                        text: text,
                        lang: language
                    });
                }
            };
            
            recognition.onerror = (event) => {
                console.error('Speech error:', event.error);
                
                if (event.error === 'aborted') {
                    // تجاهل خطأ aborted وأعد المحاولة
                    if (shouldRestart && isListening) {
                        setTimeout(() => {
                            try {
                                recognition.start();
                            } catch (e) {
                                console.log('Restart failed:', e);
                            }
                        }, 100);
                    }
                } else if (event.error === 'no-speech') {
                    // لا يوجد كلام، أعد المحاولة
                    if (shouldRestart && isListening) {
                        setTimeout(() => {
                            try {
                                recognition.start();
                            } catch (e) {}
                        }, 100);
                    }
                } else {
                    // خطأ حقيقي
                    document.getElementById('mic-status').textContent = 'Error: ' + event.error;
                }
            };
            
            recognition.onend = () => {
                console.log('Recognition ended');
                
                // إعادة التشغيل تلقائياً إذا كان يجب أن يستمر
                if (shouldRestart && isListening) {
                    setTimeout(() => {
                        try {
                            recognition.start();
                            console.log('Auto-restarted');
                        } catch (e) {
                            console.log('Restart error:', e);
                        }
                    }, 100);
                }
            };
            
            return true;
        }
        
        function startListening() {
            // إخفاء شاشة البداية
            document.getElementById('start-overlay').style.display = 'none';
            
            if (!recognition && !initRecognition()) {
                return;
            }
            
            try {
                isListening = true;
                shouldRestart = true;
                recognition.start();
                
                document.getElementById('mic-button').classList.add('listening');
                document.getElementById('mic-status').textContent = 'Listening...';
                
            } catch (e) {
                console.error('Start error:', e);
                alert('Please allow microphone access');
            }
        }
        
        function stopListening() {
            shouldRestart = false;
            isListening = false;
            
            if (recognition) {
                recognition.stop();
            }
            
            document.getElementById('mic-button').classList.remove('listening');
            document.getElementById('mic-status').textContent = 'Stopped';
        }
        
        function toggleListening() {
            if (isListening) {
                stopListening();
            } else {
                startListening();
            }
        }
        
        // Connection
        socket.on('connect', () => {
            console.log('Connected');
            document.getElementById('status-dot').style.background = '#10b981';
            document.getElementById('status-text').textContent = 'OK';
        });
        
        socket.on('disconnect', () => {
            console.log('Disconnected');
            document.getElementById('status-dot').style.background = '#ef4444';
            document.getElementById('status-text').textContent = 'ERR';
        });
        
        // Verse matched
        socket.on('verse_matched', (data) => {
            const verse = data.verse;
            
            document.getElementById('surah-info').textContent = `${verse.surah}:${verse.ayah}`;
            document.getElementById('arabic-text').textContent = verse.ar;
            document.getElementById('translation-text').textContent = verse[language] || verse.en;
            
            const conf = Math.round((data.confidence || 0) * 100);
            document.getElementById('confidence').textContent = `${conf}%`;
            document.getElementById('confidence-bar').style.width = `${conf}%`;
        });
        
        // Next verses
        socket.on('next_verses', (data) => {
            const container = document.getElementById('next-verses-container');
            container.innerHTML = '';
            
            if (data.verses && data.verses.length > 0) {
                data.verses.forEach((verse) => {
                    const trans = verse[language] || verse.en || '';
                    const div = document.createElement('div');
                    div.className = 'bg-slate-800 border-l-4 border-blue-500 p-3 rounded mb-2';
                    div.innerHTML = `
                        <div class="flex items-start space-x-2">
                            <span class="text-blue-400 font-bold text-sm">${verse.ayah}</span>
                            <div class="flex-1">
                                <p class="text-white text-sm font-quran mb-1">${verse.ar.substring(0, 60)}...</p>
                                <p class="text-gray-300 text-xs">${trans.substring(0, 60)}...</p>
                            </div>
                        </div>
                    `;
                    container.appendChild(div);
                });
            }
        });
        
        // Language selection
        function setLanguage(lang) {
            language = lang;
            document.getElementById('lang-display').textContent = `Mobile · ${langNames[lang]}`;
            
            if (recognition) {
                recognition.lang = lang === 'ar' ? 'ar-SA' : `${lang}-${lang.toUpperCase()}`;
            }
            
            document.querySelectorAll('.lang-btn').forEach(btn => {
                if (btn.dataset.lang === lang) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }
        
        // Initialize
        setLanguage(language);
        initRecognition();
    </script>
</body>
</html>
