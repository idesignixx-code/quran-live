<!DOCTYPE html>
<html lang="ar" dir="rtl" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌙 Quran Live Translation</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Scheherazade+New:wght@700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .font-arabic { font-family: 'Amiri', serif; }
        .font-quran { font-family: 'Scheherazade New', serif; }
        
        .mic-button {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 4px solid rgba(16, 185, 129, 0.3);
        }
        
        .mic-button:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(16, 185, 129, 0.6);
        }
        
        .mic-button.recording {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            box-shadow: 0 10px 30px rgba(239, 68, 68, 0.4);
            animation: pulse-red 1.5s infinite;
        }
        
        @keyframes pulse-red {
            0%, 100% { 
                transform: scale(1);
                box-shadow: 0 10px 30px rgba(239, 68, 68, 0.4);
            }
            50% { 
                transform: scale(1.1);
                box-shadow: 0 10px 50px rgba(239, 68, 68, 0.8);
            }
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">
    
    <div class="max-w-7xl mx-auto">
        
        <!-- Header -->
        <div class="bg-white rounded-2xl shadow-xl p-6 mb-6">
            <div class="flex items-center justify-between flex-wrap gap-4">
                <div class="flex items-center space-x-4 space-x-reverse">
                    <div class="text-5xl">🌙</div>
                    <div>
                        <h1 class="text-3xl font-bold text-gray-800 font-arabic">
                            نظام الترجمة الفورية للقرآن الكريم
                        </h1>
                        <p class="text-gray-600 text-sm mt-1">Quran Live Translation System</p>
                    </div>
                </div>
                
                <div class="flex items-center space-x-4 space-x-reverse">
                    <!-- Microphone Button -->
                    <div class="text-center">
                        <div class="mic-button" id="mic-button" onclick="toggleRecording()">
                            <svg class="w-10 h-10 text-white" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd" d="M7 4a3 3 0 016 0v4a3 3 0 11-6 0V4zm4 10.93A7.001 7.001 0 0017 8a1 1 0 10-2 0A5 5 0 015 8a1 1 0 00-2 0 7.001 7.001 0 006 6.93V17H6a1 1 0 100 2h8a1 1 0 100-2h-3v-2.07z" clip-rule="evenodd"></path>
                            </svg>
                        </div>
                        <p class="text-xs mt-2 text-white font-semibold" id="mic-status">اضغط للتسجيل</p>
                    </div>
                    
                    <div class="flex items-center">
                        <span class="text-sm font-semibold text-gray-700" id="status-text">Connecting...</span>
                        <span class="inline-block w-3 h-3 rounded-full bg-gray-400 ml-2" id="status-indicator"></span>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <!-- Current Verse -->
            <div class="lg:col-span-2 space-y-6">
                
                <div class="bg-white rounded-2xl shadow-xl p-8">
                    <div class="flex items-center justify-between mb-6">
                        <h2 class="text-xl font-bold text-gray-800">الآية الحالية</h2>
                        <span class="px-4 py-2 bg-purple-100 text-purple-700 rounded-full text-sm font-semibold" id="verse-info">
                            Waiting...
                        </span>
                    </div>
                    
                    <div class="bg-gradient-to-br from-purple-50 to-pink-50 rounded-2xl p-8 mb-6 border-2 border-purple-100">
                        <p class="text-4xl text-center font-quran leading-loose text-gray-900 mb-6" id="arabic-text">
                            ابدأ القراءة أو اضغط زر الميكروفون...
                        </p>
                        <p class="text-xl text-center text-gray-700 leading-relaxed" id="translation-text">
                            Start recitation or press microphone button...
                        </p>
                    </div>
                    
                    <div class="space-y-2">
                        <div class="flex items-center justify-between text-sm">
                            <span class="text-gray-600">Accuracy</span>
                            <span class="font-semibold text-green-600" id="confidence-text">-</span>
                        </div>
                        <div class="w-full bg-gray-200 rounded-full h-3">
                            <div class="bg-gradient-to-r from-green-500 to-blue-500 h-3 rounded-full transition-all duration-300" style="width: 0%" id="confidence-bar"></div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Controls -->
            <div class="space-y-6">
                
                <!-- Language Selector -->
                <div class="bg-white rounded-2xl shadow-xl p-6">
                    <h3 class="text-lg font-bold text-gray-800 mb-4">اختر اللغة</h3>
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="setLanguage('ar')" class="lang-btn px-4 py-3 rounded-xl font-semibold transition-all bg-purple-50 text-purple-700 hover:bg-purple-100" data-lang="ar">
                            🇸🇦 العربية
                        </button>
                        <button onclick="setLanguage('en')" class="lang-btn px-4 py-3 rounded-xl font-semibold transition-all bg-purple-600 text-white" data-lang="en">
                            🇬🇧 English
                        </button>
                        <button onclick="setLanguage('fr')" class="lang-btn px-4 py-3 rounded-xl font-semibold transition-all bg-purple-50 text-purple-700 hover:bg-purple-100" data-lang="fr">
                            🇫🇷 Français
                        </button>
                        <button onclick="setLanguage('nl')" class="lang-btn px-4 py-3 rounded-xl font-semibold transition-all bg-purple-50 text-purple-700 hover:bg-purple-100" data-lang="nl">
                            🇳🇱 Nederlands
                        </button>
                    </div>
                </div>
                
                <!-- Links -->
                <div class="bg-white rounded-2xl shadow-xl p-6">
                    <h3 class="text-lg font-bold text-gray-800 mb-4">الصفحات</h3>
                    <div class="space-y-3">
                        <a href="/live?lang=en" target="_blank" class="block px-4 py-3 bg-purple-50 text-purple-700 rounded-xl font-semibold hover:bg-purple-100 transition-all text-center">
                            📺 Live View (Big Screen)
                        </a>
                        <a href="/mobile?lang=en" target="_blank" class="block px-4 py-3 bg-purple-50 text-purple-700 rounded-xl font-semibold hover:bg-purple-100 transition-all text-center">
                            📱 Mobile Version
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const socket = io();
        let currentLanguage = 'en';
        let isRecording = false;
        let recognition = null;
        
        // Check for Speech Recognition support
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.lang = 'ar-SA';
            recognition.continuous = false;
            recognition.interimResults = false;
            
            recognition.onresult = (event) => {
                const text = event.results[0][0].transcript;
                console.log('Recognized:', text);
                document.getElementById('mic-status').textContent = 'جاري المعالجة...';
                
                socket.emit('recognize_verse', {
                    text: text,
                    lang: currentLanguage
                });
            };
            
            recognition.onerror = (event) => {
                console.error('Speech recognition error:', event.error);
                isRecording = false;
                document.getElementById('mic-button').classList.remove('recording');
                document.getElementById('mic-status').textContent = 'خطأ: ' + event.error;
            };
            
            recognition.onend = () => {
                isRecording = false;
                document.getElementById('mic-button').classList.remove('recording');
                document.getElementById('mic-status').textContent = 'اضغط للتسجيل';
            };
        }
        
        function toggleRecording() {
            if (!recognition) {
                alert('متصفحك لا يدعم التعرف على الصوت. جرب Chrome أو Edge.');
                return;
            }
            
            if (!isRecording) {
                try {
                    recognition.start();
                    isRecording = true;
                    document.getElementById('mic-button').classList.add('recording');
                    document.getElementById('mic-status').textContent = 'جاري التسجيل...';
                } catch (e) {
                    console.error('Error starting recognition:', e);
                }
            } else {
                recognition.stop();
            }
        }
        
        socket.on('connect', () => {
            document.getElementById('status-indicator').className = 'inline-block w-3 h-3 rounded-full bg-green-500 ml-2 animate-pulse';
            document.getElementById('status-text').textContent = 'Connected';
            document.getElementById('status-text').className = 'text-sm font-semibold text-green-600';
        });
        
        socket.on('disconnect', () => {
            document.getElementById('status-indicator').className = 'inline-block w-3 h-3 rounded-full bg-red-500 ml-2';
            document.getElementById('status-text').textContent = 'Disconnected';
            document.getElementById('status-text').className = 'text-sm font-semibold text-red-600';
        });
        
        socket.on('verse_matched', (data) => {
            const verse = data.verse;
            
            document.getElementById('verse-info').textContent = `Surah ${verse.surah} - Verse ${verse.ayah}`;
            document.getElementById('arabic-text').textContent = verse.ar;
            document.getElementById('translation-text').textContent = verse[currentLanguage] || verse.en;
            
            const confidence = Math.round((data.confidence || 0) * 100);
            document.getElementById('confidence-text').textContent = `${confidence}%`;
            document.getElementById('confidence-bar').style.width = `${confidence}%`;
            
            document.getElementById('mic-status').textContent = 'تم التعرف! ✅';
            setTimeout(() => {
                document.getElementById('mic-status').textContent = 'اضغط للتسجيل';
            }, 2000);
        });
        
        socket.on('no_match', () => {
            document.getElementById('mic-status').textContent = 'لم يتم العثور على تطابق';
            setTimeout(() => {
                document.getElementById('mic-status').textContent = 'اضغط للتسجيل';
            }, 2000);
        });
        
        function setLanguage(lang) {
            currentLanguage = lang;
            
            document.querySelectorAll('.lang-btn').forEach(btn => {
                if (btn.dataset.lang === lang) {
                    btn.className = 'lang-btn px-4 py-3 rounded-xl font-semibold transition-all bg-purple-600 text-white';
                } else {
                    btn.className = 'lang-btn px-4 py-3 rounded-xl font-semibold transition-all bg-purple-50 text-purple-700 hover:bg-purple-100';
                }
            });
        }
    </script>
</body>
</html>
